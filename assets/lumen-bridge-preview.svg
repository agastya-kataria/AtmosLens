  <!-- Card 3 titles -->
  <text x="937" y="133" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">SQL via DuckDB</text>
  <text x="937" y="151" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" fill="#38BDF8">xarray slice → in-memory DuckDB table → SQL query</text>

  <!-- SQL comment line -->
  <text x="923" y="181" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11" fill="#64748B">-- xarray cube registered as DuckDB relation "forecast"</text>

  <!-- SQL lines with keyword highlighting -->
  <text x="923" y="199" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">SELECT </tspan><tspan fill="#E2E8F0">time, lat, lon, pm2_5</tspan>
  </text>
  <text x="923" y="217" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">FROM   </tspan><tspan fill="#86EFAC">forecast</tspan>
  </text>
  <text x="923" y="235" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">WHERE  </tspan><tspan fill="#E2E8F0">time </tspan><tspan fill="#7DD3FC">BETWEEN</tspan>
  </text>
  <text x="923" y="253" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#E2E8F0">           </tspan><tspan fill="#FCA5A5">'2026-03-25T00:00'</tspan>
  </text>
  <text x="923" y="271" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#E2E8F0">       </tspan><tspan fill="#7DD3FC">AND </tspan><tspan fill="#FCA5A5">'2026-03-26T00:00'</tspan>
  </text>
  <text x="923" y="289" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">  AND  </tspan><tspan fill="#E2E8F0">lat </tspan><tspan fill="#7DD3FC">BETWEEN </tspan><tspan fill="#FCD34D">53.24 </tspan><tspan fill="#7DD3FC">AND </tspan><tspan fill="#FCD34D">53.37</tspan>
  </text>
  <text x="923" y="307" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">  AND  </tspan><tspan fill="#E2E8F0">pm2_5 &gt; </tspan><tspan fill="#FCD34D">3.9</tspan>
  </text>
  <text x="923" y="325" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">ORDER BY </tspan><tspan fill="#E2E8F0">pm2_5 </tspan><tspan fill="#7DD3FC">DESC</tspan>
  </text>
  <text x="923" y="343" font-family="Menlo,Consolas,'Courier New',monospace" font-size="12">
    <tspan fill="#7DD3FC">LIMIT </tspan><tspan fill="#FCD34D">20</tspan>
  </text>

