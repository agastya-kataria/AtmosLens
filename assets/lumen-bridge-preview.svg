  <text x="71" y="151" font-family="Menlo,Consolas,'Courier New',monospace" font-size="10.5" fill="#0F766E">extends lumen.sources.Source · source_type = "atmos_xarray"</text>

  <!-- Code block dark -->
  <rect x="56" y="166" width="383" height="170" rx="10" fill="#0F172A"/>

  <!-- Code lines — class definition -->
  <text x="68" y="184" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11" fill="#64748B"># GSoC prototype — lumen.sources.Source subclass</text>

  <text x="68" y="199" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11">
    <tspan fill="#7DD3FC">class </tspan><tspan fill="#FCD34D">AtmosXarraySource</tspan><tspan fill="#E2E8F0">(lumen.sources.Source):</tspan>
  </text>

  <text x="68" y="213" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11">
    <tspan fill="#E2E8F0">    source_type </tspan><tspan fill="#94A3B8">= </tspan><tspan fill="#FCA5A5">"atmos_xarray"</tspan>
  </text>
  <text x="68" y="227" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11">
    <tspan fill="#E2E8F0">    dataset     </tspan><tspan fill="#94A3B8">= </tspan><tspan fill="#86EFAC">param</tspan><tspan fill="#E2E8F0">.Parameter()</tspan>
  </text>

  <text x="68" y="245" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11">
    <tspan fill="#7DD3FC">    def </tspan><tspan fill="#86EFAC">get_tables</tspan><tspan fill="#E2E8F0">(self) -> list[str]:</tspan>
  </text>
  <text x="68" y="259" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11">
    <tspan fill="#E2E8F0">        </tspan><tspan fill="#7DD3FC">return </tspan><tspan fill="#86EFAC">list</tspan><tspan fill="#E2E8F0">(self.dataset.data_vars)</tspan>
  </text>

  <text x="68" y="277" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11">
    <tspan fill="#7DD3FC">    def </tspan><tspan fill="#86EFAC">get</tspan><tspan fill="#E2E8F0">(self, table: str, **query) -> DataFrame:</tspan>
  </text>
  <text x="68" y="291" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11" fill="#64748B">        # lat_min/lat_max  → .sel(lat=slice(...))</text>
  <text x="68" y="305" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11" fill="#64748B">        # time_start/end   → .sel(time=slice(...))</text>
  <text x="68" y="319" font-family="Menlo,Consolas,'Courier New',monospace" font-size="11" fill="#64748B">        # returns pd.DataFrame  (Lumen compat.)</text>

  <!-- Below code block -->
  <text x="56" y="351" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Quick API check:</text>

  <text x="56" y="368" font-family="Menlo,Consolas,'Courier New',monospace" font-size="10.5" fill="#475569">get_tables() → ['pm2_5','nitrogen_dioxide','ozone','european_aqi']</text>

  <text x="56" y="385" font-family="Menlo,Consolas,'Courier New',monospace" font-size="10.5" fill="#475569">get_schema('pm2_5')['coords']['time']</text>
  <text x="56" y="399" font-family="Menlo,Consolas,'Courier New',monospace" font-size="10.5" fill="#475569">  → {'start':'2026-03-25','end':'2026-03-26','n':48}</text>

  <text x="56" y="418" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8">← coordinate ranges, not column types</text>
  <text x="56" y="434" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8">   → the structural design gap this project fills</text>
  <text x="56" y="450" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" fill="#0F766E" font-weight="600">✓ issubclass(AtmosXarraySource, lumen.sources.Source) == True</text>


