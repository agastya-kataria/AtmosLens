  <text x="420" y="432" fill="#64748B" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15">GeoViews + hvPlot over the same xarray slice</text>
  <rect x="420" y="458" width="472" height="356" rx="22" fill="#E2E8F0"/>
