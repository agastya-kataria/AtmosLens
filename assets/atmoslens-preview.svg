      <stop stop-color="#FFF7ED"/>
      <stop offset="0.55" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="420" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF8EE"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="920" rx="32" fill="url(#bg)"/>
  <rect x="36" y="28" width="1328" height="864" rx="28" fill="#FFFFFF" fill-opacity="0.7" stroke="#CBD5E1"/>
