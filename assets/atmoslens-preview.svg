    <rect x="730" y="576" width="148" height="104" fill="#F97316"/>
    <rect x="434" y="680" width="148" height="120" fill="#FFEDD5"/>
    <rect x="582" y="680" width="148" height="120" fill="#FDBA74"/>
    <rect x="730" y="680" width="148" height="120" fill="#EA580C"/>
  </g>
