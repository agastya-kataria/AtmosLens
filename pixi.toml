[project]
name = "atmoslens"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.12.*"
panel = ">=1.8,<1.9"
holoviews = ">=1.21,<1.22"
hvplot = ">=0.12,<0.13"
geoviews = ">=1.14,<1.15"
param = ">=2.2,<2.3"
colorcet = ">=3.1,<3.2"
xarray = ">=2025.1,<2026"
scipy = ">=1.15,<2"
datashader = ">=0.18,<0.19"
lumen = ">=0.10,<0.11"
numpy = ">=2,<3"
pandas = ">=2.2,<3"
bokeh = ">=3.7,<3.8"
cartopy = ">=0.24,<0.25"
netcdf4 = ">=1.7,<2"
pytest = ">=8.3,<9"
jupyterlab = ">=4.3,<5"
pip = ">=24,<26"

[pypi-dependencies]
atmoslens = { path = ".", editable = true }

[tasks]
fetch = "python -m atmoslens.datasets --output data/sample_forecast.nc"
test = "pytest"
run = "panel serve app.py --autoreload --show"
